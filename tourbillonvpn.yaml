    tolerance: 50
    lazy: true
    proxies:
      - 🇳🇱Нидерланды 3
  - name: Remnawave
    type: select
    proxies:
      - DE SMART
      - DE AUTO
      - DE BASIC
      - PL AUTO
      - FI AUTO
      - NL AUTO
rules:
  - MATCH,Remnawave

proxy-groups:
  - name: DE SMART
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies:
      - 🇩🇪 Германия 1 fast
      - 🇩🇪 Германия 2 fast
      - 🇩🇪 Германия 3 fast
      - 🇩🇪 Германия 4 fast
  - name: DE AUTO
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies:
      - "🇩🇪 Германия 1 "
      - " 🇩🇪 Германия 2"
      - 🇩🇪 Германия 4
      - 🇩🇪 Германия 5
  - name: DE BASIC
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies:
      - "🇩🇪 Германия 1 "
      - " 🇩🇪 Германия 2"
      - 🇩🇪 Германия 4
  - name: PL AUTO
